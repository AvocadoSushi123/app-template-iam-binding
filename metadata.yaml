apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: workload-identity-binding
spec:
  info:
    title: Workload Identity Binding
    version: 14.0.0
    actuationTool:
      flavor: Terraform
      version: ">= 1.3.0"
  interfaces: # Optional
    variables:
      - name: service_account_id
        description: "Service account ID"
        varType: string
        required: true
      - name: github_repo
        description: "GitHub repository name"
        varType: string
        required: true
      - name: wif_pool
        description: "Full name: projects/PROJECT_ID/locations/global/workloadIdentityPools/POOL_ID"
        varType: string
        required: true
  requirements:
    providerVersions:
      - source: hashicorp/google
        version: ">= 6, < 7"
      - source: hashicorp/google-beta
        version: ">= 6, < 7"