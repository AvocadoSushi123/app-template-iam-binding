apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: workload-identity-binding
spec:
  info:
    version: v10
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
  interfaces: # Optional
    variables:
      - name: service_account_id
        connections:
          - source:
              source: github.com/terraform-google/terraform-google-service-accounts
              version: ">= 4.4"
            spec:
              outputExpr: email
      - name: github_repo
        description: "repository name"
        varType: string
        required: true
      - name: wif_pool
        description: "Full name: projects/PROJECT_ID/locations/global/workloadIdentityPools/POOL_ID"
        varType: string
        required: true
  requirements:
    providerVersions:
      - source: hashicorp/google
        version: ">= 6, < 7"
      - source: hashicorp/google-beta
        version: ">= 6, < 7"